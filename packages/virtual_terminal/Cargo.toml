[package]
name = "virtual_terminal"
version = "0.2.0"
edition = "2024"
description = "Virtual terminal with vt100 screen buffer, keyframe/delta replay, and viewport negotiation"

[lib]
name = "virtual_terminal"
path = "src/lib.rs"

[dependencies]
ciborium = "0.2"
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
vt100 = "0.16"
