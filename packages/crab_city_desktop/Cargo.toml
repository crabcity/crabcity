[package]
name = "crab_city_desktop"
version = "0.1.0"
edition = "2024"
description = "Native desktop app for Crab City"
publish = false

[build-dependencies]
tauri-build = { version = "2", features = [] }
# Pre-create icon cache files for Bazel compatibility.
# Tauri's generate_context!() proc macro writes processed icon data to OUT_DIR.
# In Bazel, OUT_DIR is read-only during compilation. By pre-creating the files
# in build.rs (where OUT_DIR IS writable), the proc macro's write_if_changed()
# finds matching content and skips the write.
png = "0.17"
blake3 = "1"
brotli = { version = "8", features = ["std"] }
# On macOS dev mode, generate_context!() also caches an Info.plist XML.
plist = "1"
serde_json = "1"

[dependencies]
crab_city = { path = "../crab_city" }
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-window-state = "2"
tokio = { workspace = true }
clap = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[features]
default = []
embedded-ui = ["crab_city/embedded-ui"]
